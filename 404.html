<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Page Not Found &mdash; Metaballo</title>
<meta name="description" content="The page you were looking for could not be found." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0807;
    --cream: #ead8c6;
    --cream-dim: rgba(234, 216, 198, 0.65);
    --cream-faint: rgba(234, 216, 198, 0.40);
    --peach: #f1b89a;
    --peach-hover: #f5c6ac;
    --rule: rgba(234, 216, 198, 0.15);
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'Inter', system-ui, sans-serif;
  }

  html, body {
    background: var(--bg);
    color: var(--cream);
    font-family: var(--sans);
    font-weight: 300;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--peach); color: var(--bg); }
  :focus-visible { outline: 2px solid var(--peach); outline-offset: 4px; }

  .page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px 24px;
    position: relative;
    overflow: hidden;
  }

  /* Ambient glow */
  .page::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 60%, rgba(241,184,154,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  .code {
    font-family: var(--serif);
    font-style: italic;
    font-size: clamp(100px, 20vw, 180px);
    line-height: 1;
    color: rgba(241, 184, 154, 0.12);
    letter-spacing: -0.02em;
    margin-bottom: -20px;
    user-select: none;
  }

  .eyebrow {
    font-size: 10px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--peach);
    margin-bottom: 20px;
    opacity: 0.85;
  }

  .title {
    font-family: var(--serif);
    font-style: italic;
    font-size: clamp(32px, 5vw, 56px);
    font-weight: 500;
    line-height: 1.1;
    color: var(--cream);
    margin-bottom: 24px;
  }

  .body {
    font-family: var(--serif);
    font-style: italic;
    font-size: clamp(16px, 1.4vw, 20px);
    line-height: 1.7;
    color: var(--cream-dim);
    max-width: 420px;
    margin-bottom: 52px;
  }

  .actions {
    display: flex;
    gap: 24px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn-home {
    display: inline-block;
    padding: 16px 40px;
    background: var(--peach);
    color: #2a1810;
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 0.30em;
    text-transform: uppercase;
    font-weight: 500;
    transition: background 0.3s ease;
  }
  .btn-home:hover { background: var(--peach-hover); }

  .btn-reserve {
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 0.30em;
    text-transform: uppercase;
    color: var(--cream-faint);
    transition: color 0.3s ease;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .btn-reserve::after {
    content: '';
    display: block;
    width: 20px;
    height: 1px;
    background: currentColor;
    transition: width 0.3s ease;
  }
  .btn-reserve:hover { color: var(--cream); }
  .btn-reserve:hover::after { width: 30px; }

  .divider {
    width: 1px;
    height: 60px;
    background: var(--rule);
    margin: 52px auto 0;
  }

  .logo {
    margin-top: 24px;
    font-family: var(--serif);
    font-size: 15px;
    letter-spacing: 0.32em;
    color: var(--cream-faint);
    text-transform: uppercase;
  }

  @media (max-width: 480px) {
    .actions { flex-direction: column; }
    .code { margin-bottom: -10px; }
  }
</style>
</head>
<body>

<div class="page">
  <div class="code" aria-hidden="true">404</div>
  <div class="eyebrow">Page Not Found</div>
  <h1 class="title">The room you&rsquo;re<br/>looking for is unmarked</h1>
  <p class="body">
    It may have moved, or perhaps it never existed &mdash; much like the best tables. Let us guide you back.
  </p>
  <div class="actions">
    <a class="btn-home" href="index.html">Return to Metaballo</a>
    <a class="btn-reserve" href="reservations.html">Book a Table</a>
  </div>
  <div class="divider" aria-hidden="true"></div>
  <div class="logo">Metaballo</div>
</div>

</body>
</html>
